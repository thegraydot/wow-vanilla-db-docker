services:

  mysql:
    image: wow-vmangos-db
    container_name: wow-vmangos-db
    build:
      context: mysql
      dockerfile: Dockerfile-vmangos
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_PORT: ${MYSQL_PORT}
    ports:
      - ${MYSQL_PORT}:${MYSQL_PORT}
    command: --max_allowed_packet=128M --innodb-redo-log-capacity=512M
    volumes:
      - ./volumes/vmangos_mysql:/var/lib/mysql

  python:
    image: wow-vmangos-python
    container_name: wow-vmangos-python
    build:
      context: python
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: 
      mysql:
        condition: service_started
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_PORT=${MYSQL_PORT}
    volumes:
      - ./python:/python
